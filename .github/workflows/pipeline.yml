name: Content Pipeline

on:
  schedule:
    # Runs once per day at 10:00 UTC (12:00 Spain CEST)
    - cron: '0 10 * * *'
    # Pinterest pinning — every Monday at 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      plant_name:
        description: 'Specific plant to generate (leave empty for next in queue)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run content pipeline
        run: |
          if [ -n "${{ github.event.inputs.plant_name }}" ]; then
            node scripts/pipeline.js "${{ github.event.inputs.plant_name }}"
          else
            node scripts/pipeline.js
            echo "[pipeline] Waiting 5 min before next generation..."
            sleep 300
            node scripts/pipeline.js
            echo "[pipeline] Waiting 5 min before next generation..."
            sleep 300
            node scripts/pipeline.js
            echo "[pipeline] Waiting 5 min before next generation..."
            sleep 300
            node scripts/pipeline.js
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Run listicle generator (Daily)
        run: node scripts/generate-lists.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Create Pinterest pins (Weekly — Mondays only)
        # Only runs on the Monday cron trigger, not the daily one or manual dispatch
        if: github.event.schedule == '0 11 * * 1'
        run: node scripts/pinterest-pins.js
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

      - name: Commit new content
        run: |
          git config --local user.email "pipeline@plantcareguide.com"
          git config --local user.name "Content Pipeline"
          git add content/plants/ content/articles/ scripts/plants-queue.json public/images/plants/
          [ -f scripts/pinterest-pinned.json ] && git add scripts/pinterest-pinned.json || true
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "feat: add plant care guide + image via pipeline [skip ci]"
            git push
          fi
