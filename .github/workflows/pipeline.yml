name: Content Pipeline

on:
  schedule:
    # Generate 1 EN plant/day at 09:00 UTC
    - cron: '0 9 * * *'
    # Pinterest pinning — every Monday at 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      plant_name:
        description: 'Specific plant to generate (leave empty for next in queue)'
        required: false
        type: string
      rewrite_slug:
        description: 'Slug to rewrite/enrich (leave empty to skip rewrite)'
        required: false
        type: string

jobs:
  generate:
    name: Generate EN plant
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate EN plant (1/day with quality gate)
        id: gen_en
        run: |
          if [ -n "${{ github.event.inputs.plant_name }}" ]; then
            node scripts/pipeline.js "${{ github.event.inputs.plant_name }}"
          else
            node scripts/pipeline.js
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Wait for Groq TPM reset
        run: sleep 65

      - name: Run listicle generator
        run: node scripts/generate-lists.js
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Generate Spanish translation
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.plant_name }}" ]; then
            node scripts/pipeline-es.js "${{ github.event.inputs.plant_name }}" || echo "[pipeline-es] failed, continuing"
          else
            node scripts/pipeline-es.js || echo "[pipeline-es] failed, continuing"
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Rewrite/enrich existing plant (manual trigger)
        if: github.event.inputs.rewrite_slug != ''
        run: node scripts/rewrite-existing.js "${{ github.event.inputs.rewrite_slug }}"
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Audit for duplicates (warning only — never blocks deploy)
        continue-on-error: true
        run: |
          node scripts/audit-duplicates.js || echo "[audit] Script error — skipping duplicate check"
          if [ -f audit-report.json ]; then
            EXACT=$(node -e "
              try {
                const r = require('./audit-report.json');
                const exact = Object.values(r.duplicates || {})
                  .flat()
                  .filter(g => g && (g.type === 'exact_scientific_name' || g.type === 'exact_common_name'));
                console.log(exact.length);
              } catch(e) { console.log(0); }
            " 2>/dev/null || echo "0")
            SIMILARITY=$(node -e "
              try {
                const r = require('./audit-report.json');
                const sim = Object.values(r.duplicates || {})
                  .flat()
                  .filter(g => g && g.type === 'content_similarity');
                console.log(sim.length);
              } catch(e) { console.log(0); }
            " 2>/dev/null || echo "0")
            if [ "$EXACT" -gt "0" ] 2>/dev/null; then
              echo "::warning::$EXACT exact duplicate group(s) found — review audit-report.json and clean up manually."
            else
              echo "No exact duplicates found."
            fi
            if [ "$SIMILARITY" -gt "0" ] 2>/dev/null; then
              echo "::warning::$SIMILARITY content-similarity group(s) found — review audit-report.json."
            fi
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Create Pinterest pins (Weekly — Mondays only)
        if: github.event.schedule == '0 11 * * 1'
        run: node scripts/pinterest-pins.js
        continue-on-error: true
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

      - name: Commit new content
        run: |
          git config --local user.email "pipeline@plantcareguide.com"
          git config --local user.name "Content Pipeline"
          git add content/plants/ content/articles/ content/es/ || true
          git add scripts/plants-queue.json || true
          git add scripts/rewrite-queue.json || true
          git add public/images/plants/ || true
          [ -f scripts/pinterest-pinned.json ] && git add scripts/pinterest-pinned.json || true
          if git diff --staged --quiet; then
            echo "No new content to commit — nothing to push."
          else
            PLANT_COUNT=$(git diff --staged --name-only | grep -c 'content/plants/' || true)
            git commit -m "feat: add ${PLANT_COUNT} plant(s) via pipeline [skip ci]"
            git push
          fi

      - name: Ping sitemaps after deploy
        if: success()
        continue-on-error: true
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          if [ -n "$SITE_URL" ]; then
            curl -s "https://www.google.com/ping?sitemap=${SITE_URL}/sitemap.xml" || true
            curl -s "https://www.bing.com/ping?sitemap=${SITE_URL}/sitemap.xml" || true
            echo "Sitemaps pinged."
          fi
